on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string

jobs:
  run-tests:
    name: Run project tests
    runs-on: ubuntu-latest
    env:
      MONGOMS_PREFER_GLOBAL_PATH: true
      MONGOMS_VERSION: 8.2.5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Cache mongodb binaries
        uses: actions/cache@v5
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-${{ env.MONGOMS_VERSION }}

      - name: Set pnpm project cache key
        env:
          PROJECT_PATH: ${{ inputs.project_path }}
        run: echo "PNPM_PROJECT_CACHE_KEY=$(echo ${PROJECT_PATH#*-})" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ env.PNPM_PROJECT_CACHE_KEY }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.project_path)) }}
          restore-keys: |
            pnpm-${{ env.PNPM_PROJECT_CACHE_KEY }}-
            pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --store-dir ~/.pnpm-store
        working-directory: ${{ inputs.project_path }}

      - name: Run tests
        run: pnpm test
        working-directory: ${{ inputs.project_path }}
