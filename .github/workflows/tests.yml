name: 'Tests'

on:
  pull_request:
    branches:
      - master

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      projects_node: ${{ steps.changes.outputs.projects_node }}
      projects_python: ${{ steps.changes.outputs.projects_python }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changes for projects
        id: changes
        run: bash .github/scripts/detect-changes.sh
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}

  test-node:
    name: Run tests for Node projects
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects_node) }}
    if: ${{ matrix.project.path != '' }}
    steps:
      - name: Run tests
        uses: ./.github/workflows/test-node.yml
        with:
          project_path: ${{ matrix.project.path }}

  test-python:
    name: Run tests for Python projects
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects_python) }}
    if: ${{ matrix.project.path != '' }}
    steps:
      - name: Run tests
        uses: ./.github/workflows/test-python.yml
        with:
          project_path: ${{ matrix.project.path }}
